<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Nexo Escolar">
  <!-- Background: brand navy -->
  <rect width="32" height="32" rx="7" fill="#0F1B3C"/>
  <!-- Teal accent line (top) -->
  <rect x="6" y="5" width="20" height="2.5" rx="1.25" fill="#00C9B1"/>
  <!-- "N" stroke — two verticals + diagonal -->
  <rect x="6" y="9" width="2.5" height="14" rx="1" fill="#ffffff"/>
  <polygon points="6,9 8.5,9 16,21 16,23.5 13.5,23.5" fill="#ffffff"/>
  <rect x="13.5" y="9" width="2.5" height="14" rx="1" fill="#ffffff"/>
  <!-- "E" stroke — vertical + three horizontals -->
  <rect x="18" y="9" width="2.5" height="14" rx="1" fill="#00C9B1"/>
  <rect x="18" y="9" width="8" height="2.5" rx="1" fill="#00C9B1"/>
  <rect x="18" y="14.75" width="6" height="2.5" rx="1" fill="#00C9B1"/>
  <rect x="18" y="20.5" width="8" height="2.5" rx="1" fill="#00C9B1"/>
</svg>
