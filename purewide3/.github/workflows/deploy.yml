name: Deploy Pure Wipe 3.0 to VPS

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    env:
      APP_NAME: "purewide3"
      PROJECT_PATH: "./PureWide3.csproj"
      DOTNET_VERSION: "9.0.x"
      APP_DLL: "PureWide3.dll"
      APP_PORT: "5011"
      SSH_HOST: ${{ secrets.SERVER_IP }}
      SSH_USER: ${{ secrets.USERNAME }}
      SSH_PASSWORD: ${{ secrets.PASSWORD }}
      SSH_PORT: ${{ secrets.PORT || '22' }}

      # Topology: shared domain
      USE_SHARED_DOMAIN: "true"
      SHARED_DOMAIN: ${{ secrets.SHARED_DOMAIN }}
      SHARED_SITE_FILE: ${{ secrets.SHARED_SITE_FILE }}
      ROUTE_PREFIX: "/purewide3"
      TARGET_DIR: "/var/www/purewide3"

      # Custom domain (disabled — set USE_CUSTOM_DOMAIN=true in secrets to activate)
      USE_CUSTOM_DOMAIN: "false"
      DOMAIN: ""
      CERT_DIR: ""
      CERT_CRT: ""
      CERT_KEY: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        shell: bash
        run: |
          test -n "${{ env.SSH_HOST }}"     || { echo "::error::Missing secret SERVER_IP";  exit 1; }
          test -n "${{ env.SSH_USER }}"     || { echo "::error::Missing secret USERNAME";   exit 1; }
          test -n "${{ env.SSH_PASSWORD }}" || { echo "::error::Missing secret PASSWORD";   exit 1; }

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore "${{ env.PROJECT_PATH }}"

      - name: Build
        run: dotnet build "${{ env.PROJECT_PATH }}" --configuration Release --no-restore

      - name: Publish
        run: dotnet publish "${{ env.PROJECT_PATH }}" --configuration Release --no-build --output ./publish

      - name: Provision VPS — Systemd + Nginx
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          password: ${{ env.SSH_PASSWORD }}
          port: ${{ env.SSH_PORT }}
          script: |
            set -e

            APP_NAME="purewide3"
            APP_DLL="PureWide3.dll"
            APP_PORT="5011"
            TARGET_DIR="/var/www/purewide3"
            ROUTE_PREFIX="/purewide3"
            SHARED_DOMAIN="${{ env.SHARED_DOMAIN }}"
            SHARED_SITE_FILE="${{ env.SHARED_SITE_FILE }}"
            SSH_DEPLOY_USER="${{ env.SSH_USER }}"

            SUDO_PASSWORD="$(cat <<'__SUDO_PASS__'
            ${{ env.SSH_PASSWORD }}
            __SUDO_PASS__
            )"

            sudo_run() {
              if [ "$(id -u)" -eq 0 ]; then "$@"
              else printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' "$@"; fi
            }

            sudo_sh() {
              if [ "$(id -u)" -eq 0 ]; then sh -c "$1"
              else printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' sh -c "$1"; fi
            }

            # Ensure .NET runtime is available
            if command -v apt-get >/dev/null 2>&1; then
              if ! command -v nginx >/dev/null 2>&1; then
                sudo_run apt-get update && sudo_run apt-get install -y nginx
                sudo_run systemctl enable nginx
              fi
              if ! dotnet --list-runtimes 2>/dev/null | grep -q '^Microsoft.NETCore.App 9\.'; then
                . /etc/os-release
                wget -q "https://packages.microsoft.com/config/$ID/$VERSION_ID/packages-microsoft-prod.deb" -O /tmp/packages-microsoft-prod.deb
                sudo_run dpkg -i /tmp/packages-microsoft-prod.deb || true
                sudo_run apt-get update && sudo_run apt-get install -y aspnetcore-runtime-9.0
              fi
            fi

            sudo_run mkdir -p "$TARGET_DIR"
            sudo_run chown -R "$SSH_DEPLOY_USER:www-data" "$TARGET_DIR"

            cat > "/tmp/$APP_NAME.service" <<SERVICE
            [Unit]
            Description=PureWide3 ASP.NET Core application
            After=network.target

            [Service]
            WorkingDirectory=$TARGET_DIR
            ExecStart=/usr/bin/dotnet $TARGET_DIR/$APP_DLL
            Restart=always
            RestartSec=5
            KillSignal=SIGINT
            SyslogIdentifier=$APP_NAME
            User=$SSH_DEPLOY_USER
            Environment=ASPNETCORE_ENVIRONMENT=Production
            Environment=ASPNETCORE_URLS=http://127.0.0.1:$APP_PORT
            Environment=PATH_BASE=$ROUTE_PREFIX

            [Install]
            WantedBy=multi-user.target
            SERVICE
            sudo_run install -m 644 "/tmp/$APP_NAME.service" "/etc/systemd/system/$APP_NAME.service"

            # Shared domain: add route include
            if [ -n "$SHARED_SITE_FILE" ]; then
              SHARED_CONF="/etc/nginx/sites-available/$SHARED_SITE_FILE"
              ROUTES_DIR="/etc/nginx/shared-routes/$SHARED_DOMAIN"
              ROUTE_FILE="$ROUTES_DIR/$APP_NAME.conf"

              sudo_run mkdir -p "$ROUTES_DIR"

              cat > "/tmp/$APP_NAME.route.conf" <<ROUTE
              location = $ROUTE_PREFIX {
                  return 301 $ROUTE_PREFIX/;
              }

              location ^~ $ROUTE_PREFIX/ {
                  proxy_pass http://127.0.0.1:$APP_PORT;
                  proxy_http_version 1.1;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  proxy_set_header X-Forwarded-Prefix $ROUTE_PREFIX;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection "keep-alive";
                  proxy_cache_bypass \$http_upgrade;
              }
            ROUTE
              sudo_run install -m 644 "/tmp/$APP_NAME.route.conf" "$ROUTE_FILE"

              INCLUDE_LINE="include /etc/nginx/shared-routes/$SHARED_DOMAIN/*.conf;"
              sudo_sh "grep -Fq '$INCLUDE_LINE' '$SHARED_CONF' || sed -i '\$i\\    $INCLUDE_LINE' '$SHARED_CONF'"
            fi

            sudo_run systemctl daemon-reload
            sudo_run systemctl enable "$APP_NAME.service"
            sudo_run nginx -t
            sudo_run systemctl restart nginx

      - name: Copy published files to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          password: ${{ env.SSH_PASSWORD }}
          port: ${{ env.SSH_PORT }}
          source: "publish/*"
          target: "/var/www/purewide3"
          strip_components: 1

      - name: Restart ASP.NET Core service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          password: ${{ env.SSH_PASSWORD }}
          port: ${{ env.SSH_PORT }}
          script: |
            SUDO_PASSWORD="$(cat <<'__SUDO_PASS__'
            ${{ env.SSH_PASSWORD }}
            __SUDO_PASS__
            )"

            if [ "$(id -u)" -eq 0 ]; then
              systemctl restart purewide3.service
              nginx -t && systemctl reload nginx
            else
              printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' systemctl restart purewide3.service
              printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' nginx -t
              printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' systemctl reload nginx
            fi
