# nginx-purewide3.conf — Generated by WFO vps-provisioning skill
# Topology  : Shared domain (USE_SHARED_DOMAIN=true)
# App name  : purewide3
# Kestrel   : http://127.0.0.1:5011
# Route     : /purewide3/
#
# NOTE: This file is the STATIC DOCUMENT REFERENCE for the per-app Nginx block.
# In shared-domain topology the GitHub Actions workflow injects this as a route
# fragment under /etc/nginx/shared-routes/<SHARED_DOMAIN>/purewide3.conf and
# appends an include directive to the primary sites-available file automatically.
#
# Operator: do NOT symlink this file to sites-enabled — the CI pipeline handles it.
# ─────────────────────────────────────────────────────────────────────────────

# ── Redirect bare prefix to trailing-slash ────────────────────────────────────
location = /purewide3 {
    return 301 /purewide3/;
}

# ── Reverse proxy block for /purewide3/ ──────────────────────────────────────
location ^~ /purewide3/ {
    proxy_pass         http://127.0.0.1:5011;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Prefix /purewide3;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "keep-alive";
    proxy_cache_bypass $http_upgrade;
}
